        to {
          opacity: 1;
        }

        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;

        }
      }
      .expand-creation {
        transition: all 0.3s ease-in-out;

        opacity: 0;

      // ==========================================
      // 2. RENDU DU FEED PRINCIPAL

      function renderPosts() {
        const container = document.getElementById("feed-container");
        let html = "";
        posts.forEach((post, index) => {
          const delay = index * 0.1;
          const heartIconClass = post.liked
            ? "text-red-500"
            : "text-gray-500 dark:text-gray-400 hover:text-red-500";
          const outlineClass = post.liked ? "" : "icon-outline";
          const verifiedIcon = post.author.verified
            ? '<span class="material-symbols-rounded text-blue-500 text-[14px]">verified</span>'
            : "";

          html += `
          <div class="bg-white dark:bg-gray-850 200 dark:border-gray-700 p-2 rounded border border-gray-200  dark:border-gray-800 overflow-hidden"  ;">
            
            <div class="p-4 flex items-center justify-between">

                <div>
                  <h3 class="font-bold text-sm text-gray-900 dark:text-gray-100 flex items-center gap-1">${post.author.name} ${verifiedIcon}</h3>
                  <p class="text-[11px] text-gray-500">${post.location} • ${post.time}</p>
                </div>
              </div>
              <button class="text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300"><span class="material-symbols-rounded">more_horiz</span></button>
            </div>
            
            <div onclick="openPostModal(${post.id})" class="w-full bg-gray-100 dark:bg-gray-900 border-y border-gray-200 dark:border-gray-800 relative group cursor-pointer aspect-video md:aspect-[4/3] overflow-hidden">
                <img src="${post.image}" class="w-full h-full object-cover " />
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                    <span class="material-symbols-rounded text-white text-4xl opacity-0 group-hover:opacity-100 transition-opacity drop-shadow-md">fullscreen</span>
                </div>
            </div>
            
            <div class="p-4">
              <div class="flex items-center gap-4 mb-3">
                <button onclick="toggleFeedLike(${post.id})" class="flex items-center gap-1.5 ${heartIconClass} transition-colors active:scale-90 group">
                    <span class="material-symbols-rounded text-[26px] ${outlineClass} group-hover:scale-110 transition-transform">favorite</span>
              <p class="font-bold text-sm text-gray-900 dark:text-gray-100 mb-1">${post.likes} J'aime</p>
                </button>
                <button onclick="openPostModal(${post.id})" class="flex items-center gap-1.5 text-gray-600 dark:text-gray-400 hover:text-primary-500 transition-colors active:scale-90 group">
                    <span class="material-symbols-rounded text-[26px] icon-outline group-hover:scale-110 transition-transform">chat_bubble</span>
                </button>
              
              </div>
              
               
              <div class="text-sm text-gray-800 dark:text-gray-300 leading-relaxed line-clamp-2">
                <span class="font-bold text-gray-900 dark:text-gray-100 mr-2">${post.author.name}</span>
                ${post.caption}
              </div>
              
              <button onclick="openPostModal(${post.id})" class="text-sm text-gray-500 mt-2 hover:text-gray-700 dark:hover:text-gray-400 transition-colors font-medium">
                Afficher les ${post.comments.length} commentaires
              </button>
            </div>
          </div>`;
        });
        document.getElementById("feed-container").innerHTML = html;
      }

      // ==========================================
      // 3. LOGIQUE DU POST MODAL (Instagram Style)
      // ==========================================
      let currentPostId = null;

      function openPostModal(id) {
        currentPostId = id;
        const post = posts.find((p) => p.id === id);
        if (!post) return;

        // Remplir les données de base
        document.getElementById("modal-image").src = post.image;
        document.getElementById("modal-author-avatar").src = post.author.avatar;
        document.getElementById("modal-author-avatar-small").src =
          post.author.avatar;
        document.getElementById("modal-author-name").innerHTML =
          post.author.name +
          (post.author.verified
            ? ' <span class="material-symbols-rounded text-blue-500 text-[14px]">verified</span>'
            : "");
        document.getElementById("modal-author-name-inline").innerText =
          post.author.name;
        document.getElementById("modal-location").innerText = post.location;
        document.getElementById("modal-caption").innerText = post.caption;
        document.getElementById("modal-time").innerText = post.time;

        updateModalLikeUI(post);
        renderModalComments(post);

        // Afficher le modal (retirer hidden et empecher le scroll du body)
        document.getElementById("post-modal").classList.remove("hidden");
        document.body.classList.add("overflow-hidden");
      }

      function closePostModal() {
        document.getElementById("post-modal").classList.add("hidden");
        document.body.classList.remove("overflow-hidden");
        currentPostId = null;
      }

      function renderModalComments(post) {
        const listContainer = document.getElementById("modal-comments-list");
        let html = "";

        post.comments.forEach((comment) => {
          html += `
              <div class="flex gap-3 group">
                  <img src="${comment.avatar}" class="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 flex-shrink-0 object-cover" />
                  <div class="flex-1">
                      <p class="text-sm text-gray-800 dark:text-gray-200 leading-snug">
                          <span class="font-bold text-gray-900 dark:text-white mr-1">${comment.author}</span>
                          ${comment.text}
                      </p>
                      <div class="flex items-center gap-4 mt-1">
                          <span class="text-[11px] text-gray-500">${comment.time}</span>
                          <span class="text-[11px] text-gray-500 font-medium cursor-pointer hover:text-gray-800 dark:hover:text-gray-300">Répondre</span>
                      </div>
                  </div>
                  <button class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all flex items-start pt-1">
                      <span class="material-symbols-rounded text-sm icon-outline">favorite</span>
                  </button>
              </div>`;
        });

        listContainer.innerHTML = html;
        // Scroll to bottom
        listContainer.scrollTop = listContainer.scrollHeight;
      }

      // ==========================================
      // 4. ACTIONS (Like & Commentaires)
      // ==========================================

      function toggleFeedLike(id) {
        const post = posts.find((p) => p.id === id);
        post.liked = !post.liked;
        post.likes += post.liked ? 1 : -1;
        renderPosts();
      }

      function toggleModalLike() {
        if (!currentPostId) return;
        const post = posts.find((p) => p.id === currentPostId);
        post.liked = !post.liked;
        post.likes += post.liked ? 1 : -1;

        // Animation du coeur sur l'image
        if (post.liked) {
          const heartAnim = document.getElementById("modal-heart-anim");
          heartAnim.classList.remove("opacity-0");
          heartAnim.classList.add("zoom-in");
          setTimeout(() => {
            heartAnim.classList.add("opacity-0");
            heartAnim.classList.remove("zoom-in");
          }, 800);
        }

        updateModalLikeUI(post);
        renderPosts(); // Mettre à jour le feed en arriere plan
      }

      function updateModalLikeUI(post) {
        const btn = document.getElementById("modal-btn-like");
        const icon = document.getElementById("modal-icon-like");
        document.getElementById("modal-likes-count").innerText =
          `${post.likes} J'aime`;

        if (post.liked) {
          btn.className =
            "text-red-500 transition-colors active:scale-90 group";
          icon.className =
            "material-symbols-rounded text-3xl group-hover:scale-110 transition-transform";
        } else {
          btn.className =
            "text-gray-600 dark:text-gray-400 hover:text-red-500 transition-colors active:scale-90 group";
          icon.className =
            "material-symbols-rounded text-3xl icon-outline group-hover:scale-110 transition-transform";
        }
      }

      // Ajouter un commentaire
      function submitComment() {
        const input = document.getElementById("comment-input");
        const text = input.value.trim();

        if (text !== "" && currentPostId) {
          const post = posts.find((p) => p.id === currentPostId);

          // Ajouter à l'array (Simulation BDD)
          post.comments.push({
            id: Date.now(),
            author: currentUser.name,
            avatar: currentUser.avatar,
            text: text,
            time: new Date().toLocaleString(),
            likes: 0,
          });

          input.value = ""; // Vider l'input
          renderModalComments(post); // Re-rendre la liste
          renderPosts();
        }
      }

      function handleCommentEnter(e) {
        if (e.key === "Enter") submitComment();
      }

      // ==========================================
      // 5. INITIALISATION & THEME
      // ==========================================
      document.addEventListener("DOMContentLoaded", () => {
        renderPosts();

        // Gestion Zone de création
        const createInput = document.getElementById("create-input");
        const creationTools = document.getElementById("creation-tools");
        createInput.addEventListener("focus", () =>
          creationTools.classList.add("active"),
        );

        // Fermer menus/modals au clic
        document.addEventListener("click", (e) => {
          if (
            !createInput.contains(e.target) &&
            !creationTools.contains(e.target)
          ) {
            creationTools.classList.remove("active");
          }
        });

        // Double click sur l'image du modal pour liker
        document
          .getElementById("modal-image")
          .addEventListener("dblclick", toggleModalLike);

        // Dark Mode
        const themeToggleBtn = document.getElementById("theme-toggle");
        const themeIcon = document.getElementById("theme-icon");
        const htmlElement = document.documentElement;

        if (
          localStorage.getItem("color-theme") === "dark" ||
          (!("color-theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          htmlElement.classList.add("dark");
          themeIcon.textContent = "light_mode";
        } else {
          htmlElement.classList.remove("dark");
          themeIcon.textContent = "dark_mode";
        }

        themeToggleBtn.addEventListener("click", function () {
          if (htmlElement.classList.contains("dark")) {
            htmlElement.classList.remove("dark");
            localStorage.setItem("color-theme", "light");
            themeIcon.textContent = "dark_mode";
          } else {
            htmlElement.classList.add("dark");
            localStorage.setItem("color-theme", "dark");
            themeIcon.textContent = "light_mode";
          }
        });
      });

      let selectedImageSrc = null;

      // Vérifier si l'utilisateur a écrit du texte ou ajouté une image pour activer le bouton
      function checkPublishState() {
        const text = document.getElementById("create-input").value.trim();
        const btn = document.getElementById("publish-btn");
        if (text.length > 0 || selectedImageSrc !== null) {
          btn.disabled = false;
          btn.classList.remove("opacity-50", "cursor-not-allowed");
        } else {
          btn.disabled = true;
          btn.classList.add("opacity-50", "cursor-not-allowed");
        }
      }

      // Event listener sur l'input text
      document
        .getElementById("create-input")
        .addEventListener("input", checkPublishState);

      // Fonction pour afficher l'image choisie
      function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            selectedImageSrc = e.target.result;
            document.getElementById("image-preview").src = selectedImageSrc;

            // Cacher la zone pointillée et afficher l'image
            document.getElementById("upload-zone").classList.add("hidden");
            document.getElementById("preview-zone").classList.remove("hidden");
            checkPublishState();
          };
          reader.readAsDataURL(file);
        }
      }

      // Fonction pour supprimer l'image
      function removeImage() {
        selectedImageSrc = null;
        document.getElementById("post-image-input").value = ""; // Vider l'input file
        document.getElementById("image-preview").src = "";

        // Cacher l'image et remettre la zone pointillée
        document.getElementById("preview-zone").classList.add("hidden");
        document.getElementById("upload-zone").classList.remove("hidden");
        checkPublishState();
      }

      // Fonction pour tout annuler et fermer
      function cancelPost() {
        document.getElementById("create-input").value = "";
        removeImage();
        document.getElementById("creation-tools").classList.remove("active");
      }

      // Fonction pour Publier le post
      function publishPost() {
        const text = document.getElementById("create-input").value.trim();
        if (!text && !selectedImageSrc) return; // Sécurité

        // Création du nouveau post
        const newPost = {
          id: Date.now(),
          author: {
            name: currentUser.name,
            avatar: currentUser.avatar,
            verified: false,
          },
          location: "Safi", // Par défaut
          time: "À l'instant",
          image:
            selectedImageSrc ||
            "https://images.unsplash.com/photo-1511632765486-a01980e01a18?q=80&w=800", // Image de remplacement si texte uniquement
          likes: 0,
          caption: text,
          liked: false,
          comments: [],
        };

        // Ajouter au début du tableau 'posts'
        posts.unshift(newPost);

        // Mettre à jour l'affichage et fermer le form
        renderPosts();
        cancelPost();

        // Petit scroll vers le haut pour voir le nouveau post
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    </script>
  </body>
</html>
